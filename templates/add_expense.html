
{% extends 'base.html' %}
{% block content %}
<div class="card p-4 shadow-sm col-md-6">
<h4>Add Expense</h4>
<form method="POST">
<input type="number" step="0.01" name="amount" class="form-control mb-2" placeholder="Amount" required>
<select name="category" class="form-control mb-2">
<option>Food</option>
<option>Travel</option>
<option>Rent</option>
<option>Shopping</option>
<option>Bills</option>
<option>Health</option>
<option>Entertainment</option>
<option>Other</option>
</select>
<input type="text" name="description" class="form-control mb-2" placeholder="Description">
<input type="date" name="date" class="form-control mb-2" required>
<select name="payment_method" class="form-control mb-3">
<option>UPI</option>
<option>Card</option>
<option>Cash</option>
</select>
<button class="btn btn-success">Save</button>
</form>
</div>
{% endblock %}
