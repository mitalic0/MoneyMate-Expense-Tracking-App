
{% extends 'base.html' %}
{% block content %}
<div class="card p-4 shadow-sm col-md-6">
<h4>Edit Expense</h4>
<form method="POST">
<input type="number" step="0.01" name="amount" value="{{ expense.amount }}" class="form-control mb-2" required>
<input type="text" name="category" value="{{ expense.category }}" class="form-control mb-2" required>
<input type="text" name="description" value="{{ expense.description }}" class="form-control mb-2">
<input type="date" name="date" value="{{ expense.date }}" class="form-control mb-2" required>
<input type="text" name="payment_method" value="{{ expense.payment_method }}" class="form-control mb-3">
<button class="btn btn-warning">Update</button>
</form>
</div>
{% endblock %}
